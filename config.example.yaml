# proton-watcher main config (connectivity + storage + pushover defaults).
# Copy to ~/.config/proton-watcher/config.yaml and edit.
#
# Pattern rules live in a SEPARATE file by convention; see rules.example.yaml.
# Point the daemon at it with --rules /path/to/rules.yaml or the env var
# PROTON_WATCHER_RULES. Patterns may still be inlined in this file under a
# top-level `patterns:` key if you prefer a single file — the rules file
# wins when both are present.
#
# Secrets are NEVER stored in YAML. Set them as environment variables:
#   BRIDGE_PASSWORD       - the bridge-generated IMAP password (NOT your Proton password)
#   PUSHOVER_USER_KEY     - your Pushover user key (30-char)
#   PUSHOVER_API_TOKEN    - the application/API token you create in Pushover
#
# On macOS under launchd, set them via the plist's EnvironmentVariables block
# or a wrapper script that sources ~/.config/proton-watcher/env.
# In Docker/Kubernetes, inject them via `--env`, envFrom a Secret, etc.

imap:
  host: 127.0.0.1
  port: 1143           # default Proton Mail Bridge IMAP port
  starttls: true       # Bridge requires STARTTLS on 1143
  username: paul@example.com   # the address the Bridge shows in its UI
  mailboxes:
    - INBOX
    # - "Folders/Work"    # quote any folder name containing slashes/spaces
  idle_refresh_seconds: 540   # < 29 min per RFC 2177
  ssl_verify: false           # Bridge uses a self-signed cert; set true only if you've installed its CA

ollama:
  base_url: http://home.server.lan:11434
  model: gpt-oss:20b          # any local Ollama model; see README for picks
  timeout_seconds: 45
  body_char_limit: 4000       # truncate long bodies before sending to the model

pushover:
  device: null                # e.g. "iphone"; null => all your devices
  emergency_retry: 60         # seconds between alert repeats (min 30 per API)
  emergency_expire: 1800      # stop retrying after 30 min (max 10800)
  min_urgency: 7              # 1-10; only page when verdict.urgency >= this
  sound: persistent           # Pushover sound name

# SQLite file remembering which UIDs we've already classified. Overridable at
# runtime with the STATE_DB env var — useful for mounting a PVC in Kubernetes
# without having to rewrite this file per deployment.
state_db: ~/.local/state/proton-watcher/state.sqlite3
log_level: INFO
